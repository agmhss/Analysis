<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Sheet Data Retriever</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">Advanced Google Sheet Data Retriever</h1>
       
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-700">Google Sheet ID</label>
                <input type="text" id="sheetId" placeholder="Enter Sheet ID..." class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500">
                <p class="text-xs text-gray-500 mt-1">Ensure the sheet is "Published to Web" as CSV.</p>
            </div>
            <div class="flex items-end">
                <button onclick="fetchData()" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition">Fetch Data</button>
            </div>
        </div>
        <hr class="my-6">
        <div id="controls" class="hidden space-y-6">
            <!-- Column Selection -->
            <div>
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-lg font-semibold text-gray-800">Column Selection</h3>
                    <div class="space-x-2">
                        <button onclick="selectAllColumns()" class="bg-green-600 text-white px-3 py-1 text-sm rounded hover:bg-green-700">Select All</button>
                        <button onclick="deselectAllColumns()" class="bg-gray-600 text-white px-3 py-1 text-sm rounded hover:bg-gray-700">Deselect All</button>
                    </div>
                </div>
                <div id="columnCheckboxes" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2 max-h-40 overflow-y-auto p-2 border rounded-md bg-gray-50"></div>
            </div>

            <!-- Filters -->
            <div>
                <h3 class="text-lg font-semibold text-gray-800 mb-3">Filters (AND logic)</h3>
                <div id="filterRows" class="space-y-3"></div>
                <button onclick="addFilterRow()" class="mt-3 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 text-sm">+ Add Filter</button>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-wrap gap-3 pt-3">
                <button onclick="applyFilters()" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 font-medium">Apply Filters</button>
                <button onclick="clearAllFilters()" class="bg-gray-600 text-white px-6 py-2 rounded hover:bg-gray-700 font-medium">Clear All</button>
                <button onclick="downloadPDF()" class="bg-red-600 text-white px-6 py-2 rounded hover:bg-red-700 font-medium">Download PDF</button>
            </div>
        </div>

        <div class="mt-8 overflow-x-auto">
            <table id="dataTable" class="min-w-full divide-y divide-gray-200 border text-sm">
                <thead class="bg-gray-100" id="tableHead"></thead>
                <tbody class="divide-y divide-gray-200" id="tableBody"></tbody>
            </table>
        </div>

        <div id="stats" class="mt-4 text-sm text-gray-600 hidden">
            Showing <span id="rowCount">0</span> of <span id="totalCount">0</span> rows
        </div>
    </div>

    <script>
        let rawData = [];
        let headers = [];
        let displayedData = [];
        let visibleColumns = new Set();

        // Robust dd/mm/yyyy → Date parser
        function parseDDMMYYYY(dateStr) {
            if (!dateStr) return null;
            dateStr = dateStr.trim();
            if (!/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(dateStr)) return null;

            const parts = dateStr.split('/');
            if (parts.length !== 3) return null;

            let day   = parseInt(parts[0], 10);
            let month = parseInt(parts[1], 10);
            let year  = parseInt(parts[2], 10);

            if (isNaN(day) || isNaN(month) || isNaN(year)) return null;

            // Handle 2-digit year (assume 1900–2099 range)
            if (year < 100) year += (year < 50 ? 2000 : 1900);

            // Validate
            if (month < 1 || month > 12) return null;
            if (day < 1 || day > 31) return null;

            const date = new Date(year, month - 1, day, 0, 0, 0, 0);
            // Check if date is valid (handles 31/04, 29/02 non-leap, etc.)
            if (date.getFullYear() !== year || date.getMonth() + 1 !== month || date.getDate() !== day) {
                return null;
            }
            return date;
        }

        async function fetchData() {
            const id = document.getElementById('sheetId').value.trim();
            if (!id) return alert("Please enter a Sheet ID");
            const url = `https://docs.google.com/spreadsheets/d/${id}/export?format=csv`;
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Failed to fetch");
                const data = await response.text();
                processData(data);
                document.getElementById('controls').classList.remove('hidden');
            } catch (error) {
                alert("Error fetching data. Ensure Sheet is Published to Web → CSV.");
            }
        }

        // ... (keep your existing parseCSV, processData, initControls, createColumnCheckboxes, updateVisibleColumns, selectAllColumns, deselectAllColumns functions unchanged)

        function addFilterRow() {
            const container = document.getElementById('filterRows');
            const rowId = Date.now();
            const filterRow = document.createElement('div');
            filterRow.className = 'grid grid-cols-1 md:grid-cols-4 gap-3 items-end p-3 bg-gray-50 rounded-lg border';
            filterRow.id = `filter-row-${rowId}`;

            const colOptions = headers.map((h, i) => `<option value="${i}">${escapeHtml(h)}</option>`).join('');

            filterRow.innerHTML = `
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">Column</label>
                    <select class="filter-col block w-full border border-gray-300 rounded-md p-2 text-sm" data-row="${rowId}" onchange="updateFilterUI(this)">
                        ${colOptions}
                    </select>
                </div>
                <div class="filter-input-container col-span-2 md:col-span-1">
                    <!-- Dynamic input will be inserted here -->
                </div>
                <div class="flex items-end gap-2">
                    <button onclick="removeFilterRow(${rowId})" class="bg-red-500 text-white px-3 py-1 rounded text-sm hover:bg-red-600">
                        Remove
                    </button>
                </div>
            `;
            container.appendChild(filterRow);

            // Trigger initial UI
            const select = filterRow.querySelector('.filter-col');
            updateFilterUI(select);
        }

        function updateFilterUI(selectEl) {
            const container = selectEl.closest('.grid').querySelector('.filter-input-container');
            const colIndex = parseInt(selectEl.value);
            const colName = headers[colIndex]?.toLowerCase() || '';

            const isLikelyDate = /date|dob|birth|joined|anniversary|expiry/i.test(colName);

            let html = '';

            if (isLikelyDate) {
                html = `
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">From (dd/mm/yyyy)</label>
                            <input type="text" class="filter-from block w-full border border-gray-300 rounded-md p-2 text-sm" placeholder="dd/mm/yyyy" data-row="${selectEl.dataset.row}">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-700 mb-1">To (dd/mm/yyyy)</label>
                            <input type="text" class="filter-to block w-full border border-gray-300 rounded-md p-2 text-sm" placeholder="dd/mm/yyyy" data-row="${selectEl.dataset.row}">
                        </div>
                    </div>
                `;
            } else {
                html = `
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">Contains</label>
                        <input type="text" class="filter-val block w-full border border-gray-300 rounded-md p-2 text-sm" placeholder="Enter text..." data-row="${selectEl.dataset.row}">
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        function removeFilterRow(rowId) {
            document.getElementById(`filter-row-${rowId}`)?.remove();
        }

        function applyFilters() {
            const filters = [];

            document.querySelectorAll('#filterRows > div').forEach(row => {
                const rowId = row.id.split('-').pop();
                const colSelect = row.querySelector('.filter-col');
                if (!colSelect) return;

                const col = parseInt(colSelect.value);
                const colName = headers[col]?.toLowerCase() || '';

                const isDateColumn = /date|dob|birth|joined|anniversary|expiry/i.test(colName);

                if (isDateColumn) {
                    const fromInput = row.querySelector('.filter-from');
                    const toInput   = row.querySelector('.filter-to');

                    const fromStr = fromInput?.value?.trim();
                    const toStr   = toInput?.value?.trim();

                    if (fromStr || toStr) {
                        filters.push({
                            col,
                            fromDate: fromStr ? parseDDMMYYYY(fromStr) : null,
                            toDate:   toStr   ? parseDDMMYYYY(toStr)   : null
                        });
                    }
                } else {
                    const valInput = row.querySelector('.filter-val');
                    const val = valInput?.value?.trim()?.toLowerCase();
                    if (val) {
                        filters.push({ col, val });
                    }
                }
            });

            displayedData = rawData.filter(row => {
                return filters.every(f => {
                    const cell = (row[f.col] || '').trim();

                    if ('val' in f) {
                        // Text contains filter
                        return cell.toLowerCase().includes(f.val);
                    } else {
                        // Date range filter
                        const cellDate = parseDDMMYYYY(cell);
                        if (!cellDate) return false; // invalid date → filtered out

                        if (f.fromDate && cellDate < f.fromDate) return false;
                        if (f.toDate   && cellDate > f.toDate)   return false;
                        return true;
                    }
                });
            });

            renderTable(displayedData);
            updateStats();
        }

        function clearAllFilters() {
            document.getElementById('filterRows').innerHTML = '';
            addFilterRow();
            displayedData = [...rawData];
            renderTable(displayedData);
            updateStats();
        }

        // Keep your existing renderTable, updateStats, escapeHtml, downloadPDF functions
        // They remain unchanged unless you want further improvements

        // ... paste your original functions here: parseCSV, processData, initControls, etc.

    </script>
</body>
</html>
